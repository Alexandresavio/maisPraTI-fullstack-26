<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Texto e formatações</title>
</head>

<body>
    <p>Este é um parágrafo de exemplo.</p>
    <p>Este é outro parágrafo com uma ideia diferente.</p>

    <p>Esta é a primeira linha.<br>Esta é a segunda linha.</p>

    <pre>
Linha 1
    Linha 2 com espaçamento
Linha 3
</pre>
    <blockquote>
        Este é um texto citado de outra fonte.
    </blockquote>

    <p>Primeiro parágrafo.</p>
    <hr>
    <p>Segundo parágrafo.</p>

    <p>Este é um parágrafo <p>dentro de outro.</p></p>





</body>

</html>
