<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trabalhando ccom imagens</title>
</head>

<body>
    <h1>Aprendendo sobre tag img</h1>
    <h2>Usando Imagens Locais</h2>
    <img src="imagens/logo-ferrari-200.png" alt="logo-ferrari-200">
    <br>
    <hr>
    <br>
    <h2>Imagem da web</h2>
    <img src="https://images.seeklogo.com/logo-png/5/2/ferrari-emblem-logo-png_seeklogo-53763.png" alt="logo-ferrar">
    <br>
    <hr>
    <br>
    <h2>Usando tag figure e figcaption</h2>
    <figure>
        <img src="imagens/logo-ferrari-200.png" alt="logo-ferrari-200">
        <figcaption>Logo Ferrari amarelo</figcaption>
    </figure>



</body>

</html>
