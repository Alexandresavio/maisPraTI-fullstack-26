<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Porcentagem e Pixel</title>
    <style>
        body{
            border: 2px solid red;
            padding: 8px;
        }
        .pixel{
            background-color: rgb(131, 189, 92);
            border: 1px solid black;
            padding: 8px;
            width: 200px;
        }
        .porcent{
            background-color: rgb(209, 207, 59);
            border: 1px solid black;
            padding: 8px;
            width: 50%;
        }
        #area{
            border: 3px solid rgb(85, 6, 105);
            width: 500px;
        }
    </style>
</head>
<body>
    body
    <div class="pixel">Pixel Lorem ipsum dolor sit</div>
    <div class="porcent">Porcentagem (50%)</div>
    <hr>
    <div id="area">Area
        <div class="pixel">Pixel Lorem ipsum dolor sit</div>
        <div class="porcent">Porcentagem (50%)</div>
    </div>
    <p></p><!-- apenas para aumentar o tamanho do body-->
</body>
</html>
