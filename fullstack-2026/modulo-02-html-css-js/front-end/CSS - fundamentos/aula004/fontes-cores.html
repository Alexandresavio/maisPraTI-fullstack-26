<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aprendendo sobre fontes e cores HTML5</title>
    <style>
        :root {

            --primary: #22C55E;

            --background: #111827;

            --text: #FFFFFF;

            --gray: #D1D5DB;
        }

        body {

            background: var(--background);

            color: var(--text);

            font-family: "Poppins", sans-serif;
        }

        h1 {

            font-size: 4rem;

            font-weight: 700;
        }

        p {

            font-size: 1.2rem;

            color: var(--gray);

            line-height: 1.6;
        }

        button {

            background: var(--primary);

            color: white;

            padding: 16px 32px;

            border: none;

            border-radius: 8px;

            font-size: 18px;

            font-weight: 600;
        }
    </style>
</head>

<body>
    <section class="hero">

        <h1>Treine como um campeão</h1>

        <p>
            Planos a partir de R$89.
            Matrícula gratuita este mês.
        </p>

        <button>Começar Agora</button>

    </section>
</body>

</html>
