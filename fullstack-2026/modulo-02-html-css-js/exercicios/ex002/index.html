<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aprendendo sobre Textos e formatações em HTML</title>
</head>

<body>
    <p>Este é um parágrafo de exemplo.</p>
    <p>Este é outro parágrafo com uma ideia diferente.</p>
    <hr>

    <!--tag <br> quebra de linha-->
    <p>Esta é a primeira linha.<br>Esta é a segunda linha.</p>
    <hr>

    <!-- <pre> (Texto pré-formatado):-->
    <pre>
Linha 1
    Linha 2 com espaçamento
Linha 3
</pre>
    <hr>

    <!--<blockquote> (Citação em bloco)-->
    <blockquote>
        Este é um texto citado de outra fonte.
    </blockquote>
    <hr>




</body>

</html>
